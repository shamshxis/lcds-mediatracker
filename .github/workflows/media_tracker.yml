name: 🕵️ LCDS Tracker (6-Hour Cycle)

on:
  schedule:
    - cron: "0 */6 * * *" # Runs every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas feedparser requests beautifulsoup4 duckduckgo-search

      - name: Run Tracker
        run: python tracker.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add lcds_media_tracker.csv
          
          # Only commit if changes exist
          if git diff --staged --quiet; then
            echo "No changes found."
            exit 0
          fi
          
          git commit -m "🤖 Update tracker data"
          git pull --rebase origin main
          git push
