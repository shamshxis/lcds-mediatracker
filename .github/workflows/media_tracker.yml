name: 🕵️ LCDS Media Tracker Bot

# 1. TRIGGER: Run every day at 7 AM UTC (London time approx) + Manual button
on:
  schedule:
    - cron: "0 7 * * *" 
  workflow_dispatch: # Allows you to click 'Run Now' manually

# 2. PERMISSIONS: Allow the bot to write changes back to the repo
permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      # A. Check out the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # B. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # C. Install libraries
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas feedparser requests beautifulsoup4 lxml openpyxl plotly streamlit

      # D. Run the Tracker Script
      - name: Run Tracker
        run: python tracker.py

      # E. Commit and Push (The "Smart" Fix)
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the CSV file
          git add lcds_media_tracker.csv
          
          # Check if there are actual changes (avoid empty commits)
          if git diff --staged --quiet; then
            echo "No changes to commit. Exiting."
            exit 0
          fi
          
          git commit -m "🤖 Auto-update media tracker [$(date +'%Y-%m-%d')]"
          
          # ⚠️ CRITICAL: Pull latest changes first to prevent 'rejected' errors
          git pull --rebase origin main
          
          # Push changes
          git push
