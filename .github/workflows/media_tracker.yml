name: LCDS Media Tracker Bot

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual trigger button

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run Tracker Script
        run: python tracker.py
        
      - name: Commit and Push Changes
        run: |
          git config --global user.name "LCDS Bot"
          git config --global user.email "bot@lcds.ox.ac.uk"
          git add lcds_media_tracker.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Updated media tracker" && git push)
