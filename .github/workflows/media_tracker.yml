name: 🕵️ LCDS Tracker (6-Hour Cycle)

on:
  schedule:
    - cron: "0 */6 * * *" # Runs every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # Install dependencies manually (Saves the Tracker)
      - name: Install Tracker Dependencies
        run: |
          pip install pandas feedparser requests beautifulsoup4 lxml python-dateutil

      - name: Run Tracker
        run: python tracker.py

      - name: Commit and Push (Data + Memory)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # ⚠️ ADD BOTH FILES
          git add lcds_media_tracker.csv source_memory.json
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes found."
            exit 0
          fi
          
          git commit -m "🤖 Update tracker data & memory"
          git pull --rebase origin main
          git push
